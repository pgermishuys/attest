name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0, 0.2.0-beta.1). Prerelease versions publish to "next" dist-tag.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test src/ test/

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts not found" && exit 1)
          echo "Build output verified"

      - name: Set package version and dist-tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_TAG=next" >> "$GITHUB_OUTPUT"
            echo "Publishing version $VERSION to dist-tag: next (prerelease)"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_OUTPUT"
            echo "Publishing version $VERSION to dist-tag: latest (stable)"
          fi

      - name: Publish
        run: npm publish --tag ${{ steps.version.outputs.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
